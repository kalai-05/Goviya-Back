version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: goviya-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=goviya_db
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: .
    container_name: goviya-backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/goviya_db
      - SERVER_PORT=8080
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
