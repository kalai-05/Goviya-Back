spring:
  application:
    name: goviya-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/goviya_db}
      database: goviya_db

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:goviya-super-secret-key-2025-change-in-prod}
  expiration: 86400000

firebase:
  credentials: ${FIREBASE_CREDENTIALS_PATH:firebase-credentials.json}

openweather:
  api-key: ${OPENWEATHER_API_KEY:REPLACE_WITH_YOUR_NEW_KEY}
  base-url: https://api.openweathermap.org/data/2.5

payhere:
  merchant-id: ${PAYHERE_MERCHANT_ID:your-merchant-id}
  secret: ${PAYHERE_SECRET:your-secret}
  base-url: https://sandbox.payhere.lk

logging:
  level:
    com.goviya: DEBUG
    org.springframework.data.mongodb: DEBUG
